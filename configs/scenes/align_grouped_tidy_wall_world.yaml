scene:
  scene_id: align_grouped_tidy_wall_world
  variant: align_grouped_tidy_wall_world
table:
  x_range: [-0.85, 0.85]
  y_range: [-1.10, 0.90]
  z_top: 0.80
  goal_center: [-0.52, -0.53, 0.833]
  goal_area_size_xy: [0.56, 0.22]
geometry:
  cube_size_xyz: [0.066, 0.066, 0.066]
robot:
  id: panda_left
  reach_min_xy: 0.25
  reach_max_xy: 1.50
  base_xy: [-0.42, -0.08]
  base_z: 0.88
  # Collision-free staging posture for standalone physical execution.
  physical_start_qpos: [-1.251489, 1.391494, 1.007269, -1.429392, -1.832880, 2.695749, 2.102807]
  capabilities: [pick, place]
objects:
  - {id: a, class: cube, color: blue, pose: [0.2281, -0.1550, 0.833], reachable: true, near_obstacle: false}
  - {id: b, class: cube, color: red, pose: [0.2749, -0.0686, 0.833], reachable: true, near_obstacle: false}
  - {id: c, class: cube, color: blue, pose: [0.1745, 0.0655, 0.833], reachable: true, near_obstacle: false}
  - {id: d, class: cube, color: red, pose: [0.1090, 0.3708, 0.833], reachable: true, near_obstacle: false}
  - {id: e, class: cube, color: blue, pose: [0.1066, -0.4125, 0.833], reachable: true, near_obstacle: false}
  - {id: f, class: cube, color: red, pose: [0.1932, -0.0289, 0.833], reachable: true, near_obstacle: false}
  - {id: g, class: cube, color: blue, pose: [0.2300, -0.3261, 0.833], reachable: true, near_obstacle: false}
  - {id: h, class: cube, color: red, pose: [0.1218, 0.2363, 0.833], reachable: true, near_obstacle: false}
  - {id: i, class: cube, color: blue, pose: [0.2099, 0.2137, 0.833], reachable: true, near_obstacle: false}
  - {id: j, class: cube, color: red, pose: [-0.0500, -0.5800, 0.833], reachable: true, near_obstacle: false}
  - {id: k, class: cube, color: blue, pose: [0.0200, 0.4500, 0.833], reachable: true, near_obstacle: false}
  - {id: l, class: cube, color: red, pose: [0.1347, -0.4988, 0.833], reachable: true, near_obstacle: false}
obstacles:
  - id: frontal_tall_wall
    kind: wall
    pose: [0.00, -0.08, 1.60]
    fragile: true
    radius: 0.21
    height: long
    size: [0.08, 0.10, 1.60]
task:
  name: align
  # Side-accessible objects first; slot assignment remains color/group ordered.
  target_objects: [j, l, k, e, d, g, i, a, c, b, f, h]
  description: Arrange the 12 red/blue cubes into two distinct groups neatly. With the high obstacle wall in front, use a side corridor when required.
constraints:
  preserve_obstacles: true
  max_retries_per_object: 2
  allowed_predicates: [at, clear, holding, handempty, stable]
grouped_tidy:
  enabled: true
  require_ordered: true
  slot_prefix: tidy_slot
  axis: x
  spacing: 0.090
  row_spacing: 0.140
tidy_groups:
  # Right-lower tray: reachable by Panda and clear of the initial random cube cloud.
  - {id: blue_lane, color: blue, objects: [k, e, a, c, g, i], center: [-0.52, -0.60, 0.833]}
  - {id: red_lane, color: red, objects: [j, l, b, d, f, h], center: [-0.52, -0.46, 0.833]}
physical_execution:
  enabled: true
  prioritize_side_access: true
  require_force_closure: false
  completion_policy: best_effort
  minimum_completion_ratio: 0.80
  allow_adaptive_grasp_orientation: true
  cube_mass: 0.10
  cube_friction: [2.0, 1.0, 0.5]
  table_friction: [1.0, 0.01, 0.001]
  grip_target_width: 0.052
challenge:
  type: frontal_tall_wall
  enabled: true
  obstacle_ids: [frontal_tall_wall]
  require_obstacle_aware_slots: true
  require_motion_probe: true
  inflated_clearance_required: true
  wall_blocks_direct_path: true
  side_corridors_required: true
