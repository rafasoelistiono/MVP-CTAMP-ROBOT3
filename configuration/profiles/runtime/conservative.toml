# Fine-tuning profile. Values not listed here inherit from the code profile.
extends = "conservative"
name = "local_conservative"
enable_viewer = true

[ik]
backend = "auto"
plan_position_error_m = 0.020
pregrasp_position_error_m = 0.030
max_valid_candidates = 6
max_attempts_per_segment = 80

[motion]
planner = "RRTConnect"
fragile_planner = "BITstar"
time_limit_s = 6.0
state_validity_resolution = 0.004
waypoint_step = 0.010
settle_steps_per_waypoint = 14
final_settle_steps = 40

[safety]
target_obstacle_buffer_m = 0.13
min_pick_obstacle_clearance_m = 0.18
cautious_obstacle_clearance_m = 0.24
finger_movable_contact_tolerance_m = 0.018
table_finger_contact_tolerance_m = 0.005
allow_movable_object_contact = false

[grasp]
approach_clearance_m = 0.30
open_grip_m = 0.05
place_release_lift_m = 0.005
stack_release_lift_m = 0.008
release_guide_clearance_m = 0.008
place_settle_before_open_steps = 120
release_guide_steps = 240
release_guide_settle_steps = 160
release_open_steps = 320
release_post_open_settle_steps = 160
pick_grip_sequence = [0.026, 0.025, 0.024]
pick_offset_sequence_m = [0.10, 0.10, 0.10]
pick_clearance_bonus_sequence_m = [0.0, 0.035, 0.06]

[adaptive]
min_samples = 5
pinocchio_skip_rate = 0.70
near_miss_rate = 0.40
near_miss_factor = 1.20
tolerance_headroom = 1.05
max_tolerance_factor = 1.60

[recovery]
max_stack_rebuilds = 3
staging_clearance_m = 0.11
staging_grid_step_m = 0.10
verification_settle_steps = 60

[verification]
stack_max_tilt_rad = 0.35
stack_max_linear_velocity_mps = 0.02
stack_max_angular_velocity_radps = 0.20

[telemetry]
console = true
flush_every = 1
scenario_type = "static"
